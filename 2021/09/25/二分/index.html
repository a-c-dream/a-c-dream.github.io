<figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">check</span><span class="params">(<span class="keyword">int</span> x)</span> </span>&#123;<span class="comment">/* ... */</span>&#125; <span class="comment">// 检查x是否满足某种性质</span></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">bsearch_2</span><span class="params">(<span class="keyword">int</span> l, <span class="keyword">int</span> r)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="keyword">while</span> (l &lt; r)</span><br><span class="line">	&#123;</span><br><span class="line">		<span class="keyword">int</span> mid = l + r + <span class="number">1</span> &gt;&gt; <span class="number">1</span>;</span><br><span class="line">		<span class="comment">//cout &lt;&lt; &quot;bsearch_2:&quot; &lt;&lt; l &lt;&lt; &#x27;,&#x27; &lt;&lt; r &lt;&lt; &#x27;\t&#x27; &lt;&lt; &quot;mid=&quot; &lt;&lt; mid &lt;&lt; endl;</span></span><br><span class="line">		<span class="keyword">if</span> (a[mid] &lt;= x)<span class="comment">//if(check(mid)) 这里应该写check函数判断</span></span><br><span class="line">            l = mid;</span><br><span class="line">		<span class="keyword">else</span> </span><br><span class="line">            r = mid - <span class="number">1</span>;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">return</span> l;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>两种算法的不同之处在于,当a[mid]==x时，第一种算法会将左端点右移，第二种算法则会将右端点左移，最终都会返回左端点。所以当有多个目标值是第一种会返回索引最小的（最左端的），第二种会返回索引最大的（最右端的）。目标值唯一时，两种算法均可。</p>
